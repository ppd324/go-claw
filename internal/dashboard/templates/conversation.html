{{define "conversation.html"}}{{template "layout.html" .}}{{end}}

{{define "conversation.content"}}
<section class="page-head">
    <div>
        <h1>对话</h1>
        <div class="page-subtitle">会话 ID: <span id="sessionLabel">{{.SessionID}}</span></div>
    </div>
    <div class="actions">
        <a class="btn btn-secondary" href="/conversations">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            返回
        </a>
    </div>
</section>

<div id="chatBanner" class="banner"></div>

<div class="chat-container">
    <div class="chat-main">
        <div class="chat-info-bar">
            <div class="info-left">
                <div id="sessionMeta" class="session-meta"></div>
            </div>
            <div class="info-right">
                <div id="sessionQuickInfo" class="quick-info"></div>
                <button class="btn btn-secondary btn-sm" onclick="clearChat()">清空</button>
            </div>
        </div>
        <div class="chat-messages" id="messages">
            <div class="empty">正在加载消息...</div>
        </div>
        <div class="chat-input-area">
            <div class="chat-input-wrapper">
                <textarea id="chatInput" class="chat-input" placeholder="输入你的消息...（Shift+Enter 换行）" rows="1"></textarea>
                <div class="chat-input-actions">
                    <label class="stream-toggle" title="流式输出">
                        <input type="checkbox" id="streamToggle" checked>
                        <span class="toggle-slider"></span>
                        <span class="toggle-label">流式</span>
                    </label>
                    <button class="btn btn-primary send-btn" onclick="sendMessage()" id="sendBtn">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const sessionId = "{{.SessionID}}";
let isSending = false;
let ws = null;
let currentStreamContent = '';
let currentToolCalls = [];

function isStreamMode() {
    return document.getElementById('streamToggle').checked;
}

function initWebSocket() {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}/ws`;
    
    ws = new WebSocket(wsUrl);
    
    ws.onopen = function() {
        console.log('WebSocket connected');
        const authMsg = {
            type: 'auth',
            payload: {
                platform: 'dashboard',
                platform_chat_id: 'dashboard-web-' + Date.now()
            }
        };
        ws.send(JSON.stringify(authMsg));
    };
    
    ws.onmessage = function(event) {
        const messages = event.data.split('\n').filter(line => line.trim());
        
        for (const msgStr of messages) {
            try {
                const data = JSON.parse(msgStr);
                console.log('WebSocket message received:', data);
                
                if (data.type === 'auth_ok') {
                    console.log('WebSocket authenticated');
                    return;
                }
                
                if (data.type === 'error') {
                    console.error('WebSocket error:', data.payload);
                    showChatBanner(data.payload.message || data.payload, true);
                    isSending = false;
                    updateSendButton(false);
                    return;
                }
                
                if (data.type === 'stream_event') {
                    handleStreamEvent(data.payload);
                    continue;
                }
                
                if (data.type === 'new_message' && data.payload.session_id === sessionId) {
                    handleNewMessage(data.payload.message);
                } else if (data.type === 'session_update' && data.payload.session_id === sessionId) {
                    loadConversation();
                }
            } catch (err) {
                console.error('Failed to parse WebSocket message:', err, msgStr);
            }
        }
    };
    
    ws.onclose = function() {
        console.log('WebSocket disconnected, reconnecting...');
        setTimeout(initWebSocket, 3000);
    };
    
    ws.onerror = function(error) {
        console.error('WebSocket error:', error);
    };
}

function handleStreamEvent(event) {
    console.log('Stream event:', event.type, event.data);
    
    switch (event.type) {
        case 'start':
            currentStreamContent = '';
            currentToolCalls = [];
            appendMessage('assistant', '');
            break;
            
        case 'content':
            if (event.data && event.data.content) {
                currentStreamContent += event.data.content;
                updateAssistantMessageContent(currentStreamContent);
            }
            break;
            
        case 'reasoning':
            if (event.data && event.data.content) {
                showReasoning(event.data.content);
            }
            break;
            
        case 'tool_call':
            if (event.data) {
                currentToolCalls.push({
                    tool_name: event.data.tool_name,
                    input: event.data.input,
                    call_id: event.data.call_id,
                    pending: true
                });
                updateAssistantMessageWithTools(currentStreamContent, currentToolCalls);
            }
            break;
            
        case 'tool_result':
            if (event.data) {
                const tc = currentToolCalls.find(t => t.tool_name === event.data.tool_name && t.pending);
                if (tc) {
                    tc.output = event.data.output;
                    tc.success = event.data.success;
                    tc.pending = false;
                }
                updateAssistantMessageWithTools(currentStreamContent, currentToolCalls);
            }
            break;
            
        case 'iteration':
            if (event.data) {
                showIteration(event.data.current, event.data.max);
            }
            break;
            
        case 'complete':
            console.log('Stream complete:', event.data);
            if (event.data && event.data.content) {
                currentStreamContent = event.data.content;
                updateAssistantMessageContent(currentStreamContent);
            }
            if (event.data && event.data.message_id) {
                const container = document.getElementById('messages');
                const lastMessage = container.querySelector('.message.assistant:last-child');
                if (lastMessage) {
                    lastMessage.setAttribute('data-message-id', event.data.message_id);
                }
            }
            isSending = false;
            updateSendButton(false);
            updateSessionInfo();
            break;
            
        case 'error':
            showChatBanner(event.data || '发生错误', true);
            isSending = false;
            updateSendButton(false);
            break;
    }
}

function updateAssistantMessageContent(content) {
    const container = document.getElementById('messages');
    const lastMessage = container.querySelector('.message.assistant:last-child');
    
    if (lastMessage) {
        const contentEl = lastMessage.querySelector('.message-content');
        contentEl.innerHTML = escapeHtml(content);
    }
    container.scrollTop = container.scrollHeight;
}

function updateAssistantMessageWithTools(content, toolCalls) {
    const container = document.getElementById('messages');
    const lastMessage = container.querySelector('.message.assistant:last-child');
    
    let toolCallsHtml = '';
    if (toolCalls && toolCalls.length > 0) {
        toolCallsHtml = `<div class="tool-calls">${toolCalls.map(tc => {
            const statusClass = tc.pending ? 'pending' : (tc.success ? 'success' : 'error');
            const statusIcon = tc.pending ? '⏳' : (tc.success ? '✓' : '✗');
            const toggleText = tc.pending ? '执行中...' : (tc.success ? '展开' : '查看错误');
            
            return `
            <details class="tool-call ${statusClass}" ${tc.pending ? 'open' : ''}>
                <summary class="tool-call-summary">
                    <span class="tool-call-icon">🔧</span>
                    <span class="tool-call-name">${escapeHtml(tc.tool_name)}</span>
                    <span class="tool-call-status">${statusIcon}</span>
                    <span class="tool-call-toggle">${toggleText}</span>
                </summary>
                <div class="tool-call-content">
                    <div class="tool-call-label">输入:</div>
                    <pre>${escapeHtml(tc.input || '')}</pre>
                    ${tc.output ? `<div class="tool-call-label">输出:</div><pre>${escapeHtml(tc.output)}</pre>` : ''}
                </div>
            </details>
        `}).join('')}</div>`;
    }

    if (lastMessage) {
        const contentEl = lastMessage.querySelector('.message-content');
        contentEl.innerHTML = escapeHtml(content) + toolCallsHtml;
    }
    
    container.scrollTop = container.scrollHeight;
}

function showReasoning(content) {
    const container = document.getElementById('messages');
    const lastMessage = container.querySelector('.message.assistant:last-child');
    
    if (lastMessage) {
        let reasoningEl = lastMessage.querySelector('.reasoning-block');
        if (!reasoningEl) {
            const contentEl = lastMessage.querySelector('.message-content');
            reasoningEl = document.createElement('div');
            reasoningEl.className = 'reasoning-block';
            reasoningEl.innerHTML = '<div class="reasoning-label">💭 思考中...</div><div class="reasoning-content"></div>';
            contentEl.insertBefore(reasoningEl, contentEl.firstChild);
        }
        const contentDiv = reasoningEl.querySelector('.reasoning-content');
        contentDiv.textContent = content;
    }
}

function showIteration(current, max) {
    const container = document.getElementById('messages');
    const lastMessage = container.querySelector('.message.assistant:last-child');
    
    if (lastMessage) {
        let iterEl = lastMessage.querySelector('.iteration-indicator');
        if (!iterEl) {
            const contentEl = lastMessage.querySelector('.message-content');
            iterEl = document.createElement('div');
            iterEl.className = 'iteration-indicator';
            contentEl.appendChild(iterEl);
        }
        iterEl.textContent = `迭代 ${current}/${max}`;
    }
}

function handleNewMessage(payload) {
    const lastMsg = document.querySelector('.message.assistant:last-child');
    if (lastMsg && lastMsg.querySelector('.message-content').textContent === '思考中...') {
        lastMsg.remove();
    }
    
    if (payload.content) {
        appendMessage('assistant', payload.content, payload.tool_calls || []);
    }
    
    updateSessionInfo();
}

function showChatBanner(message, isError = false) {
    const el = document.getElementById('chatBanner');
    el.textContent = message;
    el.className = isError ? 'banner error' : 'banner info';
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function renderMessages(messages) {
    const container = document.getElementById('messages');
    if (!messages || messages.length === 0) {
        container.innerHTML = '<div class="empty">暂无消息，开始对话吧！</div>';
        return;
    }

    container.innerHTML = messages.map(msg => {
        const isUser = msg.role === 'user';
        const isAssistant = msg.role === 'assistant';
        const toolCalls = msg.tool_calls || [];
        
        if (isAssistant && toolCalls.length > 0) {
            let toolCallsHtml = `<div class="tool-calls">${toolCalls.map(tc => {
                const isSuccess = tc.success !== false;
                return `
                <details class="tool-call ${isSuccess ? 'success' : 'error'}">
                    <summary class="tool-call-summary">
                        <span class="tool-call-icon">🔧</span>
                        <span class="tool-call-name">${escapeHtml(tc.tool_name)}</span>
                        <span class="tool-call-status">${isSuccess ? '✓' : '✗'}</span>
                        <span class="tool-call-toggle">${isSuccess ? '展开' : '查看错误'}</span>
                    </summary>
                    <div class="tool-call-content">
                        <div class="tool-call-label">输入:</div>
                        <pre>${escapeHtml(typeof tc.input === 'string' ? tc.input : JSON.stringify(tc.input))}</pre>
                        <div class="tool-call-label">输出:</div>
                        <pre>${escapeHtml(tc.output)}</pre>
                    </div>
                </details>
            `}).join('')}</div>`;
            
            return `
                <div class="message assistant">
                    <div class="message-avatar">🤖</div>
                    <div class="message-body">
                        <div class="message-role">助手</div>
                        <div class="message-content">${escapeHtml(msg.content || '')}${toolCallsHtml}</div>
                    </div>
                </div>
            `;
        } else {
            return `
                <div class="message ${isUser ? 'user' : 'assistant'}">
                    <div class="message-avatar">
                        ${isUser ? '👤' : '🤖'}
                    </div>
                    <div class="message-body">
                        <div class="message-role">${isUser ? '用户' : '助手'}</div>
                        <div class="message-content">${escapeHtml(msg.content || '')}</div>
                    </div>
                </div>
            `;
        }
    }).join('');

    container.scrollTop = container.scrollHeight;
}

function appendMessage(role, content, toolCalls = []) {
    const container = document.getElementById('messages');
    const emptyEl = container.querySelector('.empty');
    if (emptyEl) {
        emptyEl.remove();
    }

    const isUser = role === 'user';
    let toolCallsHtml = '';
    if (toolCalls && toolCalls.length > 0) {
        toolCallsHtml = `<div class="tool-calls">${toolCalls.map(tc => {
            return `
            <div class="tool-call ${tc.success ? 'success' : 'error'}">
                <div class="tool-call-header">
                    <span class="tool-call-icon">🔧</span>
                    <span class="tool-call-name">${escapeHtml(tc.tool_name || tc.toolName || 'Unknown')}</span>
                    <span class="tool-call-status">${tc.success ? '✓' : '✗'}</span>
                </div>
                <div class="tool-call-content">
                    <div class="tool-call-label">输入:</div>
                    <pre>${escapeHtml(tc.input || tc.Input || '')}</pre>
                    <div class="tool-call-label">输出:</div>
                    <pre>${escapeHtml(tc.output || tc.Output || '')}</pre>
                </div>
            </div>
        `}).join('')}</div>`;
    }

    const messageHtml = `
        <div class="message ${isUser ? 'user' : 'assistant'}">
            <div class="message-avatar">
                ${isUser ? '👤' : '🤖'}
            </div>
            <div class="message-body">
                <div class="message-role">${isUser ? '用户' : '助手'}</div>
                <div class="message-content">${escapeHtml(content)}${toolCallsHtml}</div>
            </div>
        </div>
    `;

    container.insertAdjacentHTML('beforeend', messageHtml);
    container.scrollTop = container.scrollHeight;
}

function updateSendButton(sending) {
    const sendBtn = document.getElementById('sendBtn');
    sendBtn.disabled = sending;
    if (sending) {
        sendBtn.innerHTML = '<span class="loading-dots">...</span>';
    } else {
        sendBtn.innerHTML = '<svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>';
    }
}

async function loadConversation() {
    if (!sessionId) {
        document.getElementById('messages').innerHTML = '<div class="empty">缺少 session_id。</div>';
        return;
    }

    const response = await fetch('/api/session?id=' + encodeURIComponent(sessionId));
    const data = await response.json();
    if (!response.ok) {
        showChatBanner(data.error || '加载对话失败', true);
        document.getElementById('messages').innerHTML = '<div class="empty">加载失败。</div>';
        return;
    }

    const session = data.session || {};
    document.getElementById('sessionMeta').textContent = `Agent ID: ${session.agent_id || '-'} | 状态：${session.status || '-'}`;
    document.getElementById('sessionQuickInfo').innerHTML = `
        <span class="quick-info-item"><strong>${escapeHtml(session.title || '未命名')}</strong></span>
        <span class="quick-info-divider">|</span>
        <span class="quick-info-item">${data.messages?.length || 0} 条消息</span>
    `;
    renderMessages(data.messages || []);
}

async function sendMessage() {
    if (isSending) return;
    
    const input = document.getElementById('chatInput');
    const content = input.value.trim();
    if (!content) {
        showChatBanner('请输入消息', true);
        return;
    }

    isSending = true;
    updateSendButton(true);

    appendMessage('user', content);
    input.value = '';
    input.style.height = 'auto';

    const streamMode = isStreamMode();

    if (streamMode && ws && ws.readyState === WebSocket.OPEN) {
        const msg = {
            type: 'message',
            payload: {
                session_id: sessionId,
                content: content,
                stream: true
            }
        };
        ws.send(JSON.stringify(msg));
    } else {
        if (streamMode) {
            showChatBanner('WebSocket 未连接，使用 HTTP 发送', true);
        }
        try {
            const response = await fetch('/api/messages', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ session_id: sessionId, content })
            });
            
            const data = await response.json();

            if (!response.ok) {
                showChatBanner(data.error || '发送失败', true);
                isSending = false;
                updateSendButton(false);
                return;
            }
            
            appendMessage('assistant', data.content || '', data.tool_calls || []);
        } catch (err) {
            showChatBanner('请求失败：' + err.message, true);
        }
        isSending = false;
        updateSendButton(false);
    }
    
    updateSessionInfo();
}

async function updateSessionInfo() {
    if (!sessionId) return;
    
    try {
        const response = await fetch('/api/session?id=' + encodeURIComponent(sessionId));
        const data = await response.json();
        if (response.ok && data.session) {
            const session = data.session;
            document.getElementById('sessionMeta').textContent = `Agent ID: ${session.agent_id || '-'} | 状态：${session.status || '-'}`;
            document.getElementById('sessionQuickInfo').innerHTML = `
                <span class="quick-info-item"><strong>${escapeHtml(session.title || '未命名')}</strong></span>
                <span class="quick-info-divider">|</span>
                <span class="quick-info-item">${data.messages?.length || 0} 条消息</span>
            `;
        }
    } catch (err) {
        console.error('Failed to update session info:', err);
    }
}

function clearChat() {
    document.getElementById('messages').innerHTML = '<div class="empty">聊天已清空。</div>';
}

document.getElementById('chatInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

document.getElementById('chatInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

initWebSocket();
loadConversation();
</script>
{{end}}
